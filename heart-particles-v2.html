<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heart</title>
    <!-- credits to the writter "@tommyho" follow him on 👉 https://codepen.io/tommyho -->
    <style>
      @keyframes gradiente {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    button:hover {
      color: white;
      background-color: rgb(100, 0, 0);
    }
    button.sim {
      border-color: rgba(95, 0, 0, 0.658);
      font-family: Verdana, sans-serif;
      border-radius: 10px;
      font-size: 25px;
      position: relative;
      top: 700px;
      left: 26%;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
        button.não {
      border-color: rgba(95, 0, 0, 0.658);
      font-family: Verdana, sans-serif;
      border-radius: 10px;
      font-size: 25px;
      position: relative;
      top: 700px;
      left: 57%;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
       body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: rgba(255, 192, 203, 0.1);
        font-family: "Archivo Black", sans-serif;
        color: white;
      }
      svg {
        cursor: default;
        position: fixed;
        top: 180px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
      }
      #c {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      .heart-outline {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 360px;
        height: 320px;
        fill: none;
        stroke: rgba(255, 255, 255, 0.3);
        stroke-width: 2;
        pointer-events: none;
        z-index: 10;
      }

      #intro-controls {
        display: none;
      }

      #intro-controls h2 {
        display: none;
      }

      #intro-controls ul {
        display: none;
      }

      #intro-controls li {
        display: none;
      }

      #toggle-fullscreen {
        display: none;
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
        z-index: 100;
        backdrop-filter: blur(5px);
      }

      @media (max-width: 600px) {
      }
    </style>
  </head>
  <body>
    <svg width="500" height="500">
  <defs>
    <path id="curva" d="M 55 170 Q 250 55 450 170" />
  </defs>
  <text font-size="24" fill="rgba(200, 0, 0, 0.8)" font-weight="bold">
    <textPath href="#curva" startOffset="50%" text-anchor="middle">
      Você aceita Namorar Comigo ?
    </textPath>
  </text>
</svg>

<button onclick="window.location.href='login.html'" class="sim">Sim</button>
<button id="não" class="não">Não</button>

    <canvas id="c"></canvas>

    <script>
      
      // Configuration
      const config = {
          particleCount: 60,
          speed: 2,
          colorScheme: 'red',
          mouseInfluence: 0,
          showHeartOutline: true,
          particleSize: 3
      };

      // Canvas setup
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      let canvasWidth = canvas.width = window.innerWidth;
      let canvasHeight = canvas.height = window.innerHeight;

    // Animation state
    let trails = [];
    let heartPath = [];
    let mouseX = canvasWidth / 2;
    let mouseY = canvasHeight / 2;
    let mouseActive = false;
    let animationRunning = false;
    // Initialize heart path points (fixed formula)
    function initHeartPath() {
        heartPath = [];
        const PI2 = 6.28318; // 2*PI approximation
        const steps = Math.max(32, config.particleCount);
        
        for (let i = 0; i < steps; i++) {
            const t = (i / steps) * PI2;
            heartPath.push([
                canvasWidth/2 + 180 * Math.pow(Math.sin(t), 3),
                canvasHeight/2 + 10 * (-(15 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)))
            ]);
        }
    }

      // Initialize particles with proper bounds checking
      function initParticles() {
          trails = [];
          if (heartPath.length === 0) initHeartPath();

          for (let i = 0; i < config.particleCount; i++) {
              const particles = [];
              const x = Math.random() * canvasWidth;
              const y = Math.random() * canvasHeight;

              for (let k = 0; k < config.particleCount; k++) {
                  // Color generation
                  let hue, saturation = Math.random() * 40 + 60;
                  let brightness = Math.random() * 60 + 20;
                  
                  switch(config.colorScheme) {
                      case 'red': hue = Math.random() * 20 + 350; break;
                      case 'blue': hue = Math.random() * 20 + 200; break;
                      case 'green': hue = Math.random() * 20 + 100; break;
                      case 'monochrome': hue = 0; saturation = 0; break;
                      default: hue = i/config.particleCount * 360; // rainbow
                  }

                  particles.push({
                      x, y,
                      velX: 0, velY: 0,
                      radius: ((1 - k/config.particleCount) + 1) * config.particleSize/2,
                      speed: Math.random() + 1,
                      targetIndex: Math.floor(Math.random() * heartPath.length),
                      direction: i % 2 * 2 - 1,
                      friction: Math.random() * 0.2 + 0.7,
                      color: `hsla(${hue},${saturation}%,${brightness}%,0.1)`
                  });
              }
              trails.push(particles);
          }
      }

      // Render a single particle
      function renderParticle(particle) {
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          ctx.fill();
      }

      // Main animation loop with robust error handling
      function animationLoop() {
          if (!animationRunning) return; // Stop the animation if not running

          try {
              // Clear with trail effect
              ctx.fillStyle = "rgba(255, 192, 203, 0.1)";
              ctx.fillRect(0, 0, canvasWidth, canvasHeight);

              trails.forEach(trail => {
                  if (!trail || !trail.length) return;
                  
                  const leader = trail[0];
                  const target = heartPath[leader.targetIndex % heartPath.length];
                  if (!target) return;

                  // Mouse influence
                  if (mouseActive && config.mouseInfluence > 0) {
                      const dx = mouseX - leader.x;
                      const dy = mouseY - leader.y;
                      const dist = Math.sqrt(dx*dx + dy*dy);
                      
                      if (dist < 300) {
                          const force = (1 - dist/300) * (config.mouseInfluence/20);
                          leader.velX += dx/dist * force;
                          leader.velY += dy/dist * force;
                      }
                  }

                  // Move toward target
                  const dx = leader.x - target[0];
                  const dy = leader.y - target[1];
                  const dist = Math.sqrt(dx*dx + dy*dy);

                  if (dist < 10) {
                      if (Math.random() > 0.95) {
                          leader.targetIndex = Math.floor(Math.random() * heartPath.length);
                      } else {
                          if (Math.random() > 0.99) leader.direction *= -1;
                          leader.targetIndex += leader.direction;
                          leader.targetIndex = (leader.targetIndex + heartPath.length) % heartPath.length;
                      }
                  }

                  // Update physics
                  leader.velX += -dx/dist * leader.speed * config.speed;
                  leader.velY += -dy/dist * leader.speed * config.speed;
                  leader.x += leader.velX;
                  leader.y += leader.velY;
                  leader.velX *= leader.friction;
                  leader.velY *= leader.friction;

                  // Render trail
                  renderParticle(leader);
                  for (let k = 1; k < trail.length; k++) {
                      trail[k].x -= (trail[k].x - trail[k-1].x) * 0.7;
                      trail[k].y -= (trail[k].y - trail[k-1].y) * 0.7;
                      renderParticle(trail[k]);
                  }
              });
          } catch (error) {
              console.error("Animation error:", error);
          }

          requestAnimationFrame(animationLoop);
      }

      // Control handlers
      function setupControls() {
          // Mouse tracking
          document.addEventListener('mousemove', (e) => {
              mouseX = e.clientX;
              mouseY = e.clientY;
              mouseActive = true;
          });
          document.addEventListener('mouseleave', () => mouseActive = false);

          // Window resize
          window.addEventListener('resize', () => {
              canvasWidth = canvas.width = window.innerWidth;
              canvasHeight = canvas.height = window.innerHeight;
              initHeartPath();
          });
      }

      // Initialize everything
      function init() {
          animationRunning = true;
          setupControls();
          animationLoop();

          // Initialize everything
          initHeartPath();
          initParticles();
      }

      // Start the animation
      init();

          const botao = document.getElementById("não");

    botao.addEventListener("click", () => {
      botao.style.display = "none"; // faz o botão desaparecer
    });
    </script>
  </body>
</html>
